<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>animation engine — tune</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font: 13px/1.4 system-ui, sans-serif; color: #e7e7ee; background: #0d0d12; }
  .wrap { display: flex; gap: 18px; padding: 18px; flex-wrap: wrap; }
  .stage { flex: 1 1 520px; min-width: 320px; }
  canvas { width: 100%; height: auto; border-radius: 10px; display: block; }
  .bgsw { display: flex; gap: 8px; margin: 10px 0; }
  .bgsw button { flex: 1; padding: 8px; border: 1px solid #333; background: #1b1b22; color: #ddd; border-radius: 6px; cursor: pointer; }
  .bgsw button.on { outline: 2px solid #6ea8ff; }
  .panel { flex: 0 0 330px; background: #1b1b22; border-radius: 10px; padding: 14px; max-height: 92vh; overflow: auto; }
  .row { display: grid; grid-template-columns: 124px 1fr 50px; align-items: center; gap: 8px; margin: 6px 0; }
  .row label { color: #aab; font-size: 12px; }
  .row output { font-variant-numeric: tabular-nums; text-align: right; color: #cfe; }
  input[type=range] { width: 100%; }
  h3 { margin: 14px 0 4px; font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: #889; }
  .transport { display: flex; gap: 8px; align-items: center; margin: 8px 0; }
  .transport button, .actions button { padding: 7px 12px; border-radius: 6px; border: 1px solid #444; background: #262631; color: #eee; cursor: pointer; }
  .actions { display: flex; gap: 8px; margin-top: 12px; }
  .actions button.primary { background: #2b5; color: #051; border-color: #2b5; font-weight: 600; }
  textarea { width: 100%; height: 150px; margin-top: 8px; background: #0d0d12; color: #9fe; border: 1px solid #333; border-radius: 6px; font: 11px/1.3 ui-monospace, monospace; padding: 8px; }
  .hint { color: #778; font-size: 11px; margin-top: 6px; }
  a { color: #6ea8ff; }
</style>
</head>
<body>
<div class="wrap">
  <div class="stage">
    <canvas id="cv"></canvas>
    <div class="bgsw" id="bgsw">
      <button data-bg="checker" class="on">checker</button>
      <button data-bg="#ffffff">white</button>
      <button data-bg="#0d1117">dark UI</button>
      <button data-bg="#f5f0e8">light UI</button>
    </div>
    <div class="transport">
      <button id="play">⏸ pause</button>
      <input id="scrub" type="range" min="0" max="1" step="0.001" value="0" style="flex:1" />
      <span id="tlabel" style="width:80px;text-align:right">0.00s</span>
    </div>
    <div class="hint">Project: <b id="pname">…</b>. Open as <code>tune.html?project=&lt;name&gt;</code> (served, see README). Tweak, then <b>Export</b> and paste into <code>project.json</code>.</div>
  </div>

  <div class="panel">
    <h3>Color</h3>
    <div class="row"><label>fill</label><input id="color" type="color" value="#ffffff"><output></output></div>
    <div id="sliders"></div>
    <div class="actions">
      <button id="export" class="primary">⇩ Export project.json</button>
      <button id="copy">Copy</button>
    </div>
    <textarea id="out" spellcheck="false" placeholder="exported timeline + motion appears here"></textarea>
  </div>
</div>

<script src="engine/anim.js"></script>
<script>
// [key, label, min, max, step]  (keys: dur.* are timeline; bare keys are motion)
const SPECS = [
  ['__h:Timing (s)'],
  ['dur.writeon','write-on',0.2,3,0.01],
  ['dur.hold1','hold word',0,2,0.01],
  ['dur.morph','morph→line',0.2,3,0.01],
  ['dur.hold2','hold line',0,1.5,0.01],
  ['dur.split','split→dots',0.2,2.5,0.01],
  ['dur.pulse','pulse loop',0.4,3,0.01],
  ['__h:Draw-in (gravity)'],
  ['revealWindow','wave width',0.03,0.5,0.01],
  ['dropHeight','drop height',0,140,1],
  ['__h:Line / dots'],
  ['lineR','line thick',4,40,0.5],
  ['lineSpan','line length',0.2,1.2,0.01],
  ['dotR','dot radius',8,60,0.5],
  ['dotGap','dot gap',30,200,1],
  ['morphBack','taut snap',0,4,0.05],
  ['splitBack','split snap',0,4,0.05],
  ['__h:Pulse'],
  ['bounceAmp','bounce',0,70,1],
  ['dotPulse','dot pulse',0,0.5,0.01],
  ['bounceStagger','stagger',0,0.5,0.01],
];
const MOTION_KEYS = SPECS.filter(s => s.length > 1 && !s[0].startsWith('dur.') && !s[0].startsWith('__')).map(s => s[0]);

const params = new URLSearchParams(location.search);
const PROJECT = params.get('project') || 'belo_thinking';
document.getElementById('pname').textContent = PROJECT;

let M, P = Anim.defaults();
let playing = true, T = 0, last = 0, bg = 'checker';
const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
const get = (o, p) => p.split('.').reduce((a, k) => a[k], o);
const set = (o, p, v) => { const ks = p.split('.'), l = ks.pop(); ks.reduce((a, k) => a[k], o)[l] = v; };

function buildPanel() {
  const host = document.getElementById('sliders');
  for (const s of SPECS) {
    if (s[0].startsWith('__h:')) { const h = document.createElement('h3'); h.textContent = s[0].slice(4); host.appendChild(h); continue; }
    const [key, lab, mn, mx, st] = s;
    const v = get(P, key);
    const row = document.createElement('div'); row.className = 'row';
    row.innerHTML = `<label>${lab}</label><input type="range" min="${mn}" max="${mx}" step="${st}" value="${v}"><output>${(+v).toFixed(2)}</output>`;
    const inp = row.querySelector('input'), out = row.querySelector('output');
    inp.addEventListener('input', () => { set(P, key, +inp.value); out.textContent = (+inp.value).toFixed(2); });
    host.appendChild(row);
  }
}
function drawChecker() {
  const s = 16;
  for (let y = 0; y < cv.height; y += s) for (let x = 0; x < cv.width; x += s) {
    ctx.fillStyle = ((x / s + y / s) & 1) ? '#2a2a33' : '#20202a'; ctx.fillRect(x, y, s, s);
  }
}
function frame(ts) {
  if (!last) last = ts; const dt = (ts - last) / 1000; last = ts;
  const tl = Anim.timeline(P), total = tl.introEnd + P.dur.pulse;
  if (playing) T = (T + dt) % total;
  if (bg === 'checker') drawChecker(); else { ctx.fillStyle = bg; ctx.fillRect(0, 0, cv.width, cv.height); }
  Anim.draw(ctx, M, Object.assign({}, P, { bg: 'transparent' }), T, { W: cv.width, H: cv.height, scale: cv.width / M.w });
  document.getElementById('scrub').value = T / total;
  document.getElementById('tlabel').textContent = T.toFixed(2) + 's';
  requestAnimationFrame(frame);
}
function exportJson() {
  const motion = {}; MOTION_KEYS.forEach(k => motion[k] = +(+P[k]).toFixed(3));
  const timeline = {}; Object.keys(P.dur).forEach(k => timeline[k] = +(+P.dur[k]).toFixed(3));
  const text = `"timeline": ${JSON.stringify(timeline, null, 2)},\n"motion": ${JSON.stringify(motion, null, 2)}`;
  document.getElementById('out').value = text; return text;
}

document.getElementById('color').addEventListener('input', e => P.color = e.target.value);
document.getElementById('bgsw').addEventListener('click', e => {
  if (e.target.dataset.bg) { bg = e.target.dataset.bg; document.querySelectorAll('#bgsw button').forEach(x => x.classList.toggle('on', x === e.target)); }
});
document.getElementById('play').addEventListener('click', e => { playing = !playing; e.target.textContent = playing ? '⏸ pause' : '▶ play'; });
document.getElementById('scrub').addEventListener('input', e => {
  playing = false; document.getElementById('play').textContent = '▶ play';
  const tl = Anim.timeline(P); T = (+e.target.value) * (tl.introEnd + P.dur.pulse);
});
document.getElementById('export').addEventListener('click', exportJson);
document.getElementById('copy').addEventListener('click', () => navigator.clipboard.writeText(exportJson()));

Promise.all([
  fetch(`projects/${PROJECT}/project.json`).then(r => r.json()),
  fetch(`projects/${PROJECT}/build/model.json`).then(r => r.json()),
]).then(([cfg, model]) => {
  P = Object.assign(Anim.defaults(), cfg.motion, { dur: Object.assign({}, Anim.defaults().dur, cfg.timeline) });
  const firstColor = Object.values(cfg.render.themes || { white: '#fff' })[0];
  P.color = firstColor; document.getElementById('color').value = firstColor;
  M = Anim.prepare(model);
  cv.width = M.w; cv.height = M.h;
  buildPanel();
  requestAnimationFrame(frame);
}).catch(e => { document.body.innerHTML = `<p style="padding:24px">Couldn't load project <b>${PROJECT}</b>. Serve the repo (see README) and build it first.<br><small>${e}</small></p>`; });
</script>
</body>
</html>
